services:
  - type: web
    name: city-market-backend
    env: node
    region: frankfurt
    plan: free
    buildCommand: rm -rf node_modules && npm install --legacy-peer-deps && ./node_modules/esbuild/bin/esbuild server/index.ts --platform=node --packages=external --bundle --format=cjs --outdir=server_dist
    startCommand: node server_dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: city-market-db
    databaseName: citymarket
    user: citymarket
    region: frankfurt
    plan: free
